# dev profile overrides.
spring:
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.offerlab.community: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

offerlab:
  kafka:
    enabled: ${OFFERLAB_KAFKA_ENABLED:false}
  elasticsearch:
    enabled: ${ELASTICSEARCH_ENABLED:false}
  realtime:
    websocket-enabled: ${OFFERLAB_REALTIME_WEBSOCKET_ENABLED:false}
